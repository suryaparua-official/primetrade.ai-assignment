services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build: ./services/user-service
    container_name: user-service
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/primetrade
      - JWT_SECRET=secret123
      - PORT=5000

    depends_on:
      mongo:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  task-service:
    build: ./services/task-service
    container_name: task-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/primetrade
      - JWT_SECRET=secret123
      - PORT=5001
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    build: ./services/nginx
    container_name: nginx-gateway
    restart: always
    ports:
      - "8000:80"

    depends_on:
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_USER_API: http://localhost:8000/api/v1
        NEXT_PUBLIC_TASK_API: http://localhost:8000/api/v1
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  mongo_data:
