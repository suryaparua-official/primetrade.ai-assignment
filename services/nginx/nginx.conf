events {}

http {
    upstream user_service {
        server user-service:5000;
    }

    upstream task_service {
        server task-service:5001;
    }

    server {
        listen 80;

        # ================= USER SERVICE =================
        location /api/v1/auth/ {
            proxy_pass http://user_service/api/v1/auth/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ================= TASK SERVICE =================
        location /api/v1/tasks/ {
            proxy_pass http://task_service/api/v1/tasks/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ================= SWAGGER =================
        location /user-docs/ {
            proxy_pass http://user_service/api-docs/;
        }

        location /task-docs/ {
            proxy_pass http://task_service/api-docs/;
        }

        location / {
            return 200 "Nginx Gateway Running";
        }
    }
}